<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fall Detection Monitor</title>
    <!-- Font phong cách công nghệ / Sci-fi -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-green: #00ffcc;
            --neon-green-dim: rgba(0, 255, 204, 0.3);
            --neon-red: #ff0055;
            --bg-color: #030a0d;
            --panel-bg: rgba(0, 20, 20, 0.6);
            --border-glow: 0 0 15px rgba(0, 255, 204, 0.4);
            --text-glow: 0 0 8px rgba(0, 255, 204, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Share Tech Mono', monospace;
        }

        body {
            background-color: var(--bg-color);
            /* Nền lưới ma trận chìm */
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--neon-green);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Hiệu ứng Scanline sọc ngang toàn màn hình */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 9999;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: var(--text-glow);
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        
        header p {
            font-size: 1rem;
            opacity: 0.8;
        }

        /* Bố cục chia 2 cột */
        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            max-width: 1500px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        @media (max-width: 992px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Style chung cho khung Control và Monitor */
        .card {
            background: var(--panel-bg);
            border: 1px solid var(--neon-green);
            border-radius: 4px;
            padding: 1.5rem;
            box-shadow: var(--border-glow);
            position: relative;
            backdrop-filter: blur(5px);
        }

        /* Viền sáng chạy vòng quanh Card */
        .card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent 40%, rgba(0, 255, 204, 0.8) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: borderShine 4s linear infinite;
            pointer-events: none;
            border-radius: 4px;
            z-index: -1;
        }

        @keyframes borderShine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .card-title {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--neon-green-dim);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #88ffcc;
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(0, 20, 20, 0.8);
            border: 1px solid var(--neon-green-dim);
            color: var(--neon-green);
            padding: 0.8rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            border-radius: 2px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3) inset, 0 0 5px rgba(0, 255, 204, 0.5);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }

        option {
            background: #021a20;
            color: var(--neon-green);
        }

        /* Nút bấm siêu nổi bật */
        .btn-activate {
            width: 100%;
            padding: 1.2rem;
            background: rgba(0, 255, 204, 0.05);
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.1), 0 0 15px rgba(0, 255, 204, 0.2);
            margin-top: 1rem;
        }

        .btn-activate:hover {
            background: var(--neon-green);
            color: var(--bg-color);
            box-shadow: 0 0 25px var(--neon-green);
            text-shadow: none;
        }

        /* Hiệu ứng quét sáng khi hover nút */
        .btn-activate::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            transition: all 0.5s ease;
            transform: skewX(-20deg);
        }

        .btn-activate:hover::before {
            left: 150%;
            transition: all 0.7s ease;
        }

        /* Khung hiển thị Video/Monitor */
        .monitor-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .monitor-screen {
            flex: 1;
            background: #000;
            border: 2px solid var(--neon-green-dim);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 450px;
        }

        /* Bóng mờ góc màn hình */
        .monitor-screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 60px rgba(0,255,204,0.15);
            pointer-events: none;
            z-index: 10;
        }

        /* Đèn LED nhấp nháy góc phải */
        .status-indicator {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid var(--neon-green-dim);
        }

        .led {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #333;
            box-shadow: inset 0 0 5px #000;
        }

        .led.active {
            background-color: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            color: #555;
            letter-spacing: 1px;
        }

        .status-text.active {
            color: var(--neon-red);
            text-shadow: 0 0 8px var(--neon-red);
        }

        /* Thẻ img hiển thị luồng MJPEG */
        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Giữ tỷ lệ khung hình video */
            display: none;
            z-index: 5;
        }

        /* Placeholder khi chưa phát */
        .placeholder {
            position: absolute;
            text-align: center;
            color: var(--neon-green-dim);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .placeholder svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            fill: var(--neon-green-dim);
            filter: drop-shadow(0 0 5px rgba(0,255,204,0.2));
        }
        
        .placeholder h2 {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.5rem;
        }

        /* Thanh equalizer trang trí góc trái */
        .decorative-bars {
            position: absolute;
            bottom: 15px;
            left: 15px;
            display: flex;
            gap: 4px;
            z-index: 20;
            align-items: flex-end;
            height: 30px;
        }

        .bar {
            width: 10px;
            height: 8px;
            background: var(--neon-green-dim);
            transition: height 0.2s ease;
        }

        .bar.active {
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
        }

        /* Dấu ngắm (Crosshairs) ở 4 góc màn hình monitor */
        .crosshair { position: absolute; width: 20px; height: 20px; border: 2px solid var(--neon-green); opacity: 0.6; z-index: 20; }
        .ch-tl { top: 10px; left: 10px; border-bottom: none; border-right: none; }
        .ch-tr { top: 10px; right: 10px; border-bottom: none; border-left: none; }
        .ch-bl { bottom: 10px; left: 10px; border-top: none; border-right: none; }
        .ch-br { bottom: 10px; right: 10px; border-top: none; border-left: none; }

        /* Hiệu ứng Glitch cho Tiêu đề Header */
        .glitch {
            position: relative;
        }
        
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
        }
        
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--neon-red);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }
        
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #0055ff;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }
        
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 86px, 0); }
            5% { clip: rect(83px, 9999px, 19px, 0); }
            10% { clip: rect(11px, 9999px, 44px, 0); }
            15% { clip: rect(54px, 9999px, 20px, 0); }
            20% { clip: rect(13px, 9999px, 55px, 0); }
            25% { clip: rect(69px, 9999px, 11px, 0); }
            30% { clip: rect(31px, 9999px, 78px, 0); }
            35% { clip: rect(89px, 9999px, 32px, 0); }
            40% { clip: rect(14px, 9999px, 60px, 0); }
            45% { clip: rect(74px, 9999px, 89px, 0); }
            50% { clip: rect(22px, 9999px, 51px, 0); }
            55% { clip: rect(48px, 9999px, 15px, 0); }
            60% { clip: rect(98px, 9999px, 40px, 0); }
            65% { clip: rect(33px, 9999px, 83px, 0); }
            70% { clip: rect(61px, 9999px, 25px, 0); }
            75% { clip: rect(17px, 9999px, 72px, 0); }
            80% { clip: rect(85px, 9999px, 95px, 0); }
            85% { clip: rect(41px, 9999px, 8px, 0); }
            90% { clip: rect(59px, 9999px, 63px, 0); }
            95% { clip: rect(7px, 9999px, 91px, 0); }
            100% { clip: rect(93px, 9999px, 37px, 0); }
        }
        
        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            5% { clip: rect(52px, 9999px, 74px, 0); }
            10% { clip: rect(79px, 9999px, 85px, 0); }
            15% { clip: rect(75px, 9999px, 5px, 0); }
            20% { clip: rect(67px, 9999px, 61px, 0); }
            25% { clip: rect(14px, 9999px, 79px, 0); }
            30% { clip: rect(1px, 9999px, 66px, 0); }
            35% { clip: rect(86px, 9999px, 30px, 0); }
            40% { clip: rect(23px, 9999px, 98px, 0); }
            45% { clip: rect(85px, 9999px, 72px, 0); }
            50% { clip: rect(71px, 9999px, 75px, 0); }
            55% { clip: rect(2px, 9999px, 48px, 0); }
            60% { clip: rect(30px, 9999px, 16px, 0); }
            65% { clip: rect(59px, 9999px, 50px, 0); }
            70% { clip: rect(41px, 9999px, 62px, 0); }
            75% { clip: rect(2px, 9999px, 82px, 0); }
            80% { clip: rect(47px, 9999px, 73px, 0); }
            85% { clip: rect(3px, 9999px, 27px, 0); }
            90% { clip: rect(26px, 9999px, 55px, 0); }
            95% { clip: rect(42px, 9999px, 97px, 0); }
            100% { clip: rect(38px, 9999px, 49px, 0); }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="glitch" data-text="AI FALL DETECTION">AI FALL DETECTION</h1>
        <p>SYSTEM MONITORING & ALERT TERMINAL</p>
    </header>

    <div class="container">
        <!-- Control Panel -->
        <div class="card controls">
            <div class="card-title">
                <span>// CONTROL_PANEL</span>
                <span style="font-size: 0.8rem; opacity: 0.5;">v2.0.4</span>
            </div>

            <!-- Yêu cầu 2: Dropdown Menu chọn Clip -->
            <div class="form-group">
                <label for="clip-select">> SELECT_VIDEO_SOURCE</label>
                <select id="clip-select">
                    <option value="" disabled selected>-- Chọn luồng video --</option>
                    <!-- Thẻ <option> sẽ được đổ tự động từ mảng JS -->
                </select>
            </div>

            <!-- Yêu cầu 3: Tên/SĐT Zalo -->
            <div class="form-group">
                <label for="zalo-receiver">> ZALO_RECEIVER (Tên/SĐT người nhận)</label>
                <input type="text" id="zalo-receiver" placeholder="Ví dụ: 0912345678 hoặc Nguyễn Văn A...">
            </div>

            <!-- Yêu cầu 3: Nội dung lời nhắn -->
            <div class="form-group">
                <label for="zalo-message">> ALERT_MESSAGE (Nội dung cảnh báo)</label>
                <textarea id="zalo-message" placeholder="Cảnh báo: Phát hiện người ngã tại khu vực..."></textarea>
            </div>

            <!-- Yêu cầu 5: Nút Kích hoạt -->
            <button class="btn-activate" id="btn-activate">
                Kích hoạt hệ thống & Xem Live
            </button>
            
            <div style="margin-top: 1.5rem; font-size: 0.85rem; color: #88ffcc; opacity: 0.7; font-family: monospace;">
                > STATUS: <span id="sys-status">IDLE / WAITING INPUT</span><br>
                > UPLINK: <span id="sys-uplink">OFFLINE</span>
            </div>
        </div>

        <!-- Yêu cầu 4: Monitor Panel -->
        <div class="monitor-wrapper">
            <div class="card monitor-screen">
                
                <!-- Đèn LED REC/LIVE -->
                <div class="status-indicator">
                    <div class="led" id="led-indicator"></div>
                    <span class="status-text" id="status-text">READY</span>
                </div>

                <!-- Chữ Sẵn Sàng ban đầu -->
                <div class="placeholder" id="placeholder">
                    <svg viewBox="0 0 24 24">
                        <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8Z" />
                    </svg>
                    <h2>HỆ THỐNG SẴN SÀNG</h2>
                    <p style="font-size: 0.95rem; margin-top: 0.5rem; opacity: 0.8;">Chờ lệnh kích hoạt luồng camera...</p>
                </div>

                <!-- Thẻ img dùng để hứng luồng Stream MJPEG từ server -->
                <img id="video-feed" src="" alt="Live Stream Feed" />

                <!-- Các thanh nhấp nháy mô phỏng tín hiệu Data -->
                <div class="decorative-bars">
                    <div class="bar active" style="height: 15px;"></div>
                    <div class="bar active" style="height: 25px;"></div>
                    <div class="bar" style="height: 10px;"></div>
                    <div class="bar" style="height: 20px;"></div>
                    <div class="bar" style="height: 8px;"></div>
                </div>
                
                <!-- Góc ngắm Camera -->
                <div class="crosshair ch-tl"></div>
                <div class="crosshair ch-tr"></div>
                <div class="crosshair ch-bl"></div>
                <div class="crosshair ch-br"></div>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình URL Backend - Đã trỏ tới Cloudflare Tunnel
        const SERVER_URL = 'https://retirement-charges-stored-debate.trycloudflare.com';

        // 1. Khởi tạo danh sách Clip (Mảng Placeholder để bạn tự thêm bớt dữ liệu)
        const AVAILABLE_CLIPS = [
            'clip001.mp4',
            'clip002.mp4',
            '005',
            'camera_hallway_01.mp4',
            'fall_simulation.avi'
        ];

        // Hàm đưa các clip vào thẻ Select
        function initClipDropdown() {
            const selectEl = document.getElementById('clip-select');
            AVAILABLE_CLIPS.forEach(clip => {
                const option = document.createElement('option');
                option.value = clip;
                option.textContent = `> ${clip}`;
                selectEl.appendChild(option);
            });
        }

        // 2. Xử lý sự kiện khi bấm nút Kích Hoạt
        document.getElementById('btn-activate').addEventListener('click', function() {
            const clipName = document.getElementById('clip-select').value;
            const zaloReceiver = document.getElementById('zalo-receiver').value.trim();
            const zaloMessage = document.getElementById('zalo-message').value.trim();

            if (!clipName) {
                alert('[LỖI HỆ THỐNG] Vui lòng chọn một luồng video (video source) trước khi kích hoạt!');
                return;
            }

            // --- YÊU CẦU 3: LOG RA CONSOLE OBJECT JSON CHO BACKEND ---
            // Bạn có thể bắt Object này để dùng cho tính năng Fetch API gửi Zalo sau này
            const requestData = {
                tên_clip: clipName,
                người_nhận: zaloReceiver,
                lời_nhắn: zaloMessage
            };
            
            console.log('=== DỮ LIỆU CHUẨN BỊ XỬ LÝ (GỬI ZALO) ===');
            console.log(JSON.stringify(requestData, null, 2));
            console.log('==========================================');

            // --- YÊU CẦU 4 & TÍCH HỢP LUỒNG VIDEO TỪ BACKEND CŨ ---
            activateLiveStream(clipName, zaloReceiver, zaloMessage);
        });

        // Hàm thay đổi Giao diện và Hiện Video Stream
        function activateLiveStream(clipName, receiverName, message) {
            // Cập nhật text trạng thái trên Control Panel
            const sysStatus = document.getElementById('sys-status');
            sysStatus.textContent = 'ACTIVE / STREAMING';
            sysStatus.style.color = 'var(--neon-red)';
            document.getElementById('sys-uplink').textContent = 'CONNECTED';
            document.getElementById('sys-uplink').style.color = 'var(--neon-green)';
            
            // Ẩn placeholder Sẵn Sàng
            document.getElementById('placeholder').style.display = 'none';
            
            // Bật LED đỏ và chữ REC / LIVE
            const led = document.getElementById('led-indicator');
            const statusText = document.getElementById('status-text');
            led.classList.add('active');
            statusText.classList.add('active');
            statusText.textContent = 'REC / LIVE';

            // Gán Source cho thẻ <img> để bắt đầu hứng luồng MJPEG
            const videoFeed = document.getElementById('video-feed');
            
            // Dùng timestamp ở tham số phụ (_t) để tránh trình duyệt cache luồng Stream
            const streamUrl = `${SERVER_URL}/video-feed?clip=${encodeURIComponent(clipName)}&name=${encodeURIComponent(receiverName)}&msg=${encodeURIComponent(message)}&_t=${new Date().getTime()}`;
            
            videoFeed.src = streamUrl;
            videoFeed.style.display = 'block';

            // Kích hoạt hiệu ứng Data equalizer góc trái
            setInterval(() => {
                const bars = document.querySelectorAll('.bar');
                bars.forEach(bar => {
                    // Random độ cao thanh và class active
                    bar.style.height = `${Math.floor(Math.random() * 25) + 5}px`;
                    if(Math.random() > 0.4) {
                        bar.classList.add('active');
                    } else {
                        bar.classList.remove('active');
                    }
                });
            }, 150); // Cập nhật siêu nhanh giống đang truyền dữ liệu
        }

        // Khởi chạy khi tải xong trang
        window.addEventListener('DOMContentLoaded', () => {
            initClipDropdown();
        });
    </script>
</body>
</html>
