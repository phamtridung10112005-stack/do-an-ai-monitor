<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi-Task Control Panel | High-Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(15, 23, 42, 0.4);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --accent-glow: rgba(59, 130, 246, 0.5);
            --accent-green: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background-color: var(--bg-color); color: var(--text-main); min-height: 100vh;
            display: flex; flex-direction: column; padding: 2rem;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
        }

        header { text-align: center; margin-bottom: 2.5rem; }
        header h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .container { display: grid; grid-template-columns: 450px 1fr; gap: 2rem; max-width: 1500px; margin: 0 auto; width: 100%; flex: 1; }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; padding: 2rem; backdrop-filter: blur(16px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .controls { display: flex; flex-direction: column; gap: 1.5rem; }
        .card-title { font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 12px; }
        .card-title::before { content: ''; display: block; width: 6px; height: 20px; background: var(--accent-gradient); border-radius: 8px; }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { color: var(--text-dim); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); color: var(--text-main); padding: 1rem; font-size: 0.95rem; border-radius: 14px; outline: none; transition: all 0.3s ease; }
        input:focus, select:focus, textarea:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15); }

        /* 🔥 FIX CHÍ MẠNG: Sửa lỗi chữ biến mất trắng tinh trên thanh chọn dropdown menu */
        select optgroup { background-color: #0f172a !important; color: #3b82f6 !important; font-weight: 700; font-size: 0.9rem; }
        select option { background-color: #030712 !important; color: #f8fafc !important; padding: 0.5rem; }

        .checkbox-group { display: grid; grid-template-columns: 1fr; gap: 0.75rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 14px; border: 1px solid var(--card-border); }
        .checkbox-item { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-main); font-weight: 500; font-size: 0.95rem; }
        .checkbox-item input { width: auto; cursor: pointer; accent-color: #8b5cf6; }

        .mode-selector { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 12px; border: 1px solid var(--card-border); }
        .mode-btn { flex: 1; padding: 0.75rem; border: none; border-radius: 8px; background: transparent; color: var(--text-dim); font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .mode-btn.active { background: var(--accent-gradient); color: white; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }

        .btn-activate { width: 100%; padding: 1.1rem; background: var(--accent-gradient); color: #fff; border: none; border-radius: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-activate:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.5); }

        .monitor-screen { background: #02040a; border-radius: 24px; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 550px; }
        .status-indicator { position: absolute; top: 1.5rem; right: 1.5rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.85rem; z-index: 10; background: rgba(3, 7, 18, 0.8); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--card-border); opacity: 0; }
        .status-indicator.active { opacity: 1; }
        .led-active { width: 8px; height: 8px; border-radius: 50%; background-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        
        #video-feed { width: 100%; height: 100%; object-fit: contain; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>Hệ Thống Phân Tích Hành Vi Đa Nhiệm V3.1</h1>
    </header>

    <div class="container">
        <div class="card controls">
            <div class="card-title">Cấu hình Hệ thống</div>

            <div class="form-group">
                <label>Địa chỉ Ngrok / Cloudflare URL Backend</label>
                <input type="text" id="server-url" placeholder="https://...trycloudflare.com" onchange="loadClipsDynamically()">
            </div>

            <div class="form-group">
                <label>Chế độ nguồn cấp dữ liệu</label>
                <div class="mode-selector">
                    <button class="mode-btn active" id="btn-mode-live" onclick="switchMode('live')">IP CAMERA LIVE</button>
                    <button class="mode-btn" id="btn-mode-demo" onclick="switchMode('demo')">DEMO CLIP MÔ PHỎNG</button>
                </div>
            </div>

            <div id="demo-clip-wrapper" class="form-group hidden">
                <label for="clip-select">Chọn Clip Mô Phỏng (Auto-Scan)</label>
                <select id="clip-select">
                    <option value="">-- Vui lòng nhập URL Server để nạp danh sách clip --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Bộ lọc phân luồng AI</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" id="chk-nga" checked> 🚨 Nhận diện Ngã</label>
                    <label class="checkbox-item"><input type="checkbox" id="chk-baoluc" checked> ⚔️ Nhận diện Bạo lực</label>
                    <label class="checkbox-item"><input type="checkbox" id="chk-taptruong" checked> 📚 Mất tập trung lớp học</label>
                </div>
            </div>

            <div class="form-group">
                <label for="zalo-receiver">Người nhận Zalo</label>
                <input type="text" id="zalo-receiver" placeholder="Kiệt Tày">
            </div>

            <div class="form-group">
                <label for="zalo-message">Nội dung tin nhắn</label>
                <textarea id="zalo-message" placeholder="Hệ thống phát hiện sự cố khẩn cấp!"></textarea>
            </div>

            <button class="btn-activate" id="btn-activate"><span>KÍCH HOẠT HỆ THỐNG</span></button>
        </div>

        <div class="card monitor-screen">
            <div class="status-indicator" id="status-indicator">
                <div class="led-active"></div>
                <span style="color: #fff; letter-spacing: 1px;">AI STREAMING</span>
            </div>
            <div id="placeholder" style="text-align: center; color: var(--text-dim);">
                <h2>MÀN HÌNH ĐIỀU KHIỂN</h2>
                <p style="margin-top: 5px;">Hệ thống sẵn sàng tiếp nhận luồng dữ liệu</p>
            </div>
            <img id="video-feed" src="" alt="Live Feed" />
        </div>
    </div>

    <script>
        let currentMode = 'live';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btn-mode-live').classList.toggle('active', mode === 'live');
            document.getElementById('btn-mode-demo').classList.toggle('active', mode === 'demo');
            document.getElementById('demo-clip-wrapper').classList.toggle('hidden', mode === 'live');
            if(mode === 'demo') loadClipsDynamically();
        }

        // 🔥 TUYỆT CHIÊU 3: Tự động gọi API lên Pi 5 bốc sạch toàn bộ file clip ném lên Vercel
        async function loadClipsDynamically() {
            const serverUrl = document.getElementById('server-url').value.trim();
            if (!serverUrl) return;
            
            const cleanUrl = serverUrl.replace(/\/$/, "");
            const selectEl = document.getElementById('clip-select');
            
            try {
                const response = await fetch(`${cleanUrl}/list-clips`);
                const data = await response.json();
                
                selectEl.innerHTML = ''; // Xóa thông báo cũ
                
                const friendlyNames = {
                    "bao_luc_hoc_duong": "⚔️ BẠO LỰC HỌC ĐƯỜNG",
                    "hoc_sinh_hoc_bai": "📚 HÀNH VI LỚP HỌC",
                    "te_nga": "🚨 TÉ NGÃ LỚP HỌC"
                };

                for (const [folder, files] of Object.entries(data)) {
                    const group = document.createElement('optgroup');
                    group.label = friendlyNames[folder] || folder.toUpperCase();
                    
                    files.forEach(file => {
                        const option = document.createElement('option');
                        option.value = `${folder}/${file}`;
                        option.textContent = file;
                        group.appendChild(option);
                    });
                    selectEl.appendChild(group);
                }
            } catch (err) {
                console.error("Lỗi quét kho dữ liệu clip:", err);
            }
        }

        document.getElementById('btn-activate').addEventListener('click', function() {
            const serverUrl = document.getElementById('server-url').value.trim();
            if (!serverUrl) {
                alert('Vui lòng nhập URL kết nối Server Backend!');
                return;
            }
            localStorage.setItem('SAVED_URL_V3', serverUrl);

            const checkNga = document.getElementById('chk-nga').checked;
            const checkBaoluc = document.getElementById('chk-baoluc').checked;
            const checkTaptruong = document.getElementById('chk-taptruong').checked;
            
            let receiver = document.getElementById('zalo-receiver').value.trim() || "Kiệt Tày";
            let message = document.getElementById('zalo-message').value.trim() || "Phát hiện sự cố khẩn cấp!";

            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('status-indicator').classList.add('active');
            
            const cleanUrl = serverUrl.replace(/\/$/, "");
            let streamUrl = `${cleanUrl}/video-feed?mode=${currentMode}&check_nga=${checkNga}&check_baoluc=${checkBaoluc}&check_taptruong=${checkTaptruong}&name=${encodeURIComponent(receiver)}&msg=${encodeURIComponent(message)}`;
            
            if (currentMode === 'demo') {
                const clipPath = document.getElementById('clip-select').value;
                if(!clipPath) { alert('Chưa chọn clip hoặc danh sách chưa nạp xong!'); return; }
                const parts = clipPath.split('/');
                streamUrl += `&clip_type=${parts[0]}&clip_name=${parts[1]}`;
            }

            const videoEl = document.getElementById('video-feed');
            videoEl.src = streamUrl;
            videoEl.style.display = 'block';
        });

        window.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('SAVED_URL_V3');
            if (savedUrl) {
                document.getElementById('server-url').value = savedUrl;
                loadClipsDynamically();
            }
        });
    </script>
</body>
</html>
