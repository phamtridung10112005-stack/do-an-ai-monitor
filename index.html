<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fall Detection | Luxury High-Tech</title>
    <!-- Font Plus Jakarta Sans cực kỳ sang trọng và hiện đại -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Tông màu Obsidian Black huyền bí */
            --bg-color: #030712;
            
            /* Glassmorphism */
            --card-bg: rgba(15, 23, 42, 0.4);
            --card-border: rgba(255, 255, 255, 0.05);
            
            /* Typography */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            
            /* Accent Colors: Xanh hạt lựu chuyển tím Linear */
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --accent-glow: rgba(59, 130, 246, 0.5);
            --accent-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 3rem 2rem;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* Điểm sáng nền rất mờ ảo, cảm giác sâu thẳm */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-size: 2.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        header p {
            font-size: 1.1rem;
            color: var(--text-dim);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .container {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 2.5rem;
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .controls {
            animation: fadeInLeft 1s ease-out;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .card-title::before {
            content: '';
            display: block;
            width: 8px;
            height: 24px;
            background: var(--accent-gradient);
            border-radius: 8px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .form-group label {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Input / Select / Textarea Luxury Styling */
        input, select, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 1.25rem 1.2rem;
            font-size: 1rem;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            appearance: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
            background-size: 1.2em;
            padding-right: 3rem;
            cursor: pointer;
        }

        select option {
            background: var(--bg-color);
            color: var(--text-main);
        }

        /* Focus Animation cho Form Elements */
        input:focus, select:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #8b5cf6;
            /* Phát sáng lan tỏa chậm giống năng lượng hội tụ */
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15), inset 0 2px 4px rgba(0,0,0,0.2);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(148, 163, 184, 0.4);
        }

        /* Nút Kích hoạt Premium Micro-interactions */
        .btn-activate {
            width: 100%;
            padding: 1.25rem;
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px var(--accent-glow);
            margin-top: 1rem;
        }

        /* Hiệu ứng Shimmer sweep qua nút */
        .btn-activate::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: skewX(-20deg);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-activate span {
            position: relative;
            z-index: 2;
        }

        .btn-activate:hover {
            transform: translateY(-3px); /* Nhấc nhẹ nút lên cực êm */
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.6), 0 0 10px rgba(59, 130, 246, 0.4);
        }

        .btn-activate:hover::after {
            left: 150%;
        }

        /* Monitor Layout */
        .monitor-wrapper {
            animation: fadeInRight 1s ease-out;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .monitor-screen {
            flex: 1;
            background: #02040a; /* Đen sâu thẳm như màn hình tắt của Apple */
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 550px;
            padding: 0;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        /* Đèn Live Badge với hiệu ứng thở (Breathing) sâu lắng */
        .status-indicator {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 20;
            background: rgba(3, 7, 18, 0.7);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(-20px);
        }

        .status-indicator.active {
            opacity: 1;
            transform: translateY(0);
        }

        .led-breath {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-red);
            /* Nhịp thở chậm rãi, sâu lắng */
            animation: breathGlow 3s infinite ease-in-out;
        }

        @keyframes breathGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.4); opacity: 0.5; transform: scale(0.9); }
            50% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.9), 0 0 30px rgba(239, 68, 68, 0.3); opacity: 1; transform: scale(1.1); }
        }

        .status-text {
            color: #fff;
            letter-spacing: 1.5px;
        }

        /* Thẻ img hiển thị Video với hiệu ứng Fade-in cực mượt */
        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #video-feed.playing {
            opacity: 1;
        }

        /* Hiệu ứng Glow Pulse / Skeleton Loading cực kỳ công nghệ */
        .placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.2);
            z-index: 1;
            transition: opacity 0.8s ease;
        }

        /* Luồng sáng quét ngang skeleton */
        .placeholder::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transform: translateX(-100%);
            animation: skeletonSweep 2.5s infinite;
        }

        @keyframes skeletonSweep {
            100% { transform: translateX(100%); }
        }

        .placeholder-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 1.5rem;
            stroke: rgba(148, 163, 184, 0.4);
            stroke-width: 1.5;
            fill: none;
            /* Pulse icon */
            animation: pulseIcon 3s infinite ease-in-out;
        }

        @keyframes pulseIcon {
            0%, 100% { opacity: 0.4; transform: scale(0.95); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .placeholder h2 {
            font-weight: 500;
            font-size: 1.35rem;
            letter-spacing: 0.5px;
            color: var(--text-main);
            opacity: 0.9;
        }

        .placeholder p {
            margin-top: 0.75rem;
            font-size: 0.95rem;
            color: var(--text-dim);
            opacity: 0.7;
        }

        /* Animations cho toàn bộ Layout */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

    </style>
</head>
<body>

    <header>
        <h1>AI Fall Detection</h1>
        <p>Hệ thống giám sát phân tích thời gian thực</p>
    </header>

    <div class="container">
        <!-- Bảng điều khiển -->
        <div class="card controls">
            <div class="card-title">Cấu hình Hệ thống</div>

            <div class="form-group">
                <label for="clip-select">Nguồn Video Stream</label>
                <select id="clip-select">
                    <option value="" disabled selected>-- Chọn luồng camera cần giám sát --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="zalo-receiver">Thông tin nhận cảnh báo (Zalo)</label>
                <input type="text" id="zalo-receiver" placeholder="Nhập SĐT hoặc tên người nhận...">
            </div>

            <div class="form-group">
                <label for="zalo-message">Nội dung đính kèm</label>
                <textarea id="zalo-message" placeholder="Hệ thống phát hiện có người ngã. Vui lòng kiểm tra khu vực này..."></textarea>
            </div>

            <button class="btn-activate" id="btn-activate">
                <span>KÍCH HOẠT QUAN SÁT</span>
            </button>
        </div>

        <!-- Khung Màn Hình Monitor -->
        <div class="monitor-wrapper">
            <div class="card monitor-screen">
                
                <!-- Đèn báo LIVE -->
                <div class="status-indicator" id="status-indicator">
                    <div class="led-breath"></div>
                    <span class="status-text">LIVE STREAM</span>
                </div>

                <!-- Glow Pulse / Skeleton Loading Placeholder -->
                <div class="placeholder" id="placeholder">
                    <svg class="placeholder-icon" viewBox="0 0 24 24">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <h2>Màn Hình Chờ</h2>
                    <p>Sẵn sàng tiếp nhận luồng video phân tích</p>
                </div>

                <!-- Luồng Stream -->
                <img id="video-feed" src="" alt="Live Stream Feed" />
            </div>
        </div>
    </div>

    <script>
        // Cấu hình URL Backend - Giữ nguyên tuyệt đối
        
        const SERVER_URL = 'https://civilization-hawaiian-served-drunk.trycloudflare.com';
        // 4. Mảng Clip cập nhật chính xác theo yêu cầu mới nhất
        const AVAILABLE_CLIPS = [
            'clip001.mp4', 
            'clip002.mp4', 
            'clip003.mp4', 
            '005', 
            'clip006.mp4', 
            'clip007.mp4', 
            'clip008.mp4', 
            'clip009.mp4', 
            'clip100.mp4'
        ];

        // Đổ dữ liệu vào Dropdown
        function initClipDropdown() {
            const selectEl = document.getElementById('clip-select');
            AVAILABLE_CLIPS.forEach(clip => {
                const option = document.createElement('option');
                option.value = clip;
                
                // Tách lấy số trong chuỗi clip để làm nhãn hiển thị sang trọng hơn (Luồng Camera 001)
                const match = clip.match(/\d+/);
                const num = match ? match[0].padStart(3, '0') : ''; 
                option.textContent = num ? `Luồng Camera ${num}` : clip;
                
                selectEl.appendChild(option);
            });
        }

        // Bắt sự kiện Click nút Kích hoạt
        document.getElementById('btn-activate').addEventListener('click', function() {
            const clipName = document.getElementById('clip-select').value;
            const zaloReceiver = document.getElementById('zalo-receiver').value.trim();
            const zaloMessage = document.getElementById('zalo-message').value.trim();

            if (!clipName) {
                alert('Vui lòng chọn Video Source để bắt đầu phân tích!');
                return;
            }

            // Object in ra console theo đúng logic cũ
            const requestData = {
                tên_clip: clipName,
                người_nhận: zaloReceiver,
                lời_nhắn: zaloMessage
            };
            
            console.log('=== DỮ LIỆU CHUẨN BỊ XỬ LÝ (GỬI ZALO) ===');
            console.log(JSON.stringify(requestData, null, 2));
            console.log('==========================================');

            // Gọi hàm logic stream
            activateLiveStream(clipName, zaloReceiver, zaloMessage);
        });

        // 5. Giữ nguyên cấu trúc truyền URL, cập nhật hiệu ứng UI Fade-in
        function activateLiveStream(clipName, receiverName, message) {
            // Xử lý hiệu ứng tắt Placeholder (Fade out)
            const placeholder = document.getElementById('placeholder');
            placeholder.style.opacity = '0';
            setTimeout(() => {
                placeholder.style.display = 'none';
            }, 800);
            
            // Hiện LED Live Badge thở sâu lắng
            const indicator = document.getElementById('status-indicator');
            indicator.classList.add('active');

            // Gắn src và tạo hiệu ứng Fade in mượt mà cho màn hình Live
            const videoFeed = document.getElementById('video-feed');
            
            // --- LOGIC BACKEND GIỮ NGUYÊN HOÀN TOÀN ---
            const streamUrl = `${SERVER_URL}/video-feed?clip=${encodeURIComponent(clipName)}&name=${encodeURIComponent(receiverName)}&msg=${encodeURIComponent(message)}&_t=${new Date().getTime()}`;
            
            videoFeed.src = streamUrl;
            videoFeed.style.display = 'block';
            
            // Kích hoạt class animation
            setTimeout(() => {
                videoFeed.classList.add('playing');
            }, 50);
        }

        // Tự động nạp Dropdown khi trang vừa mở
        window.addEventListener('DOMContentLoaded', () => {
            initClipDropdown();
        });
    </script>
</body>
</html>
